<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <input type="text" id="password" placeholder="Your secure password" readonly>

    <div class="length-box">
        <label>Password Length: <span id="lenValue">8</span></label>
        <input type="range" id="length" min="4" max="20" value="8">
    </div>

    <div class="strength-meter">
        <div id="strengthBar" class="bar"></div>
    </div>
    <p id="strengthText">Strength: -</p>
    <p id="crackTimeText">Crack time: -</p>

    <button class="primary-btn" onclick="generatePassword()">Generate Password</button>
    <button class="secondary-btn" onclick="copyPassword()">Copy Password</button>

    <p id="message"></p>
</div>

<script src="script.js"></script>
</body>
</html>
